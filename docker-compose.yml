# =============================================================================
# EXTENDRIX — Orquestación Odoo multi-versión
#
# Infraestructura base: PostgreSQL + Nginx + Certbot
# Los servicios Odoo se agregan via sync-projects.sh o new-project.sh.
# Soporta cualquier versión de Odoo: la imagen se construye desde build/Dockerfile
# y el perfil de cada versión vive en config/versions/{VERSION}.conf.
#
# Convención de nombres de contenedores:
#   odoo{VERSION}_{PROYECTO}_{ENTORNO}
#   Ejemplos: odoo14_merida_prod | odoo18_motomarket_sta
#
# PUERTOS INTERNOS (solo accesibles vía Nginx, bindeados a 127.0.0.1):
#   Rango por versión: {ver}010–{ver}099  (ej: Odoo 14 → 14010–14099, Odoo 18 → 18010–18099)
#   Puerto longpolling = puerto_http + 1  (ej: 14010 → 14011)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BASE DE DATOS — PostgreSQL compartido (multi-versión)
  # Un único Postgres para todo el servidor. La imagen y el tuning son
  # configurables vía .env (Compose solo interpola desde .env / el entorno).
  # PG 13 (default) es válido para Odoo 14–19; subí a 15/16 si lo necesitás.
  # Prefijo de DB por proyecto: {proyecto}_{entorno}_*
  # ---------------------------------------------------------------------------
  db:
    image: ${POSTGRES_IMAGE:-postgres:13-alpine}
    container_name: odoo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable POSTGRES_PASSWORD requerida en .env}
      POSTGRES_DB:       postgres
    command: >
      postgres
        -c max_connections=${PG_MAX_CONNECTIONS:-200}
        -c shared_buffers=${PG_SHARED_BUFFERS:-512MB}
        -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1536MB}
        -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c work_mem=${PG_WORK_MEM:-4MB}
        -c min_wal_size=${PG_MIN_WAL_SIZE:-1GB}
        -c max_wal_size=${PG_MAX_WAL_SIZE:-4GB}
        -c log_min_duration_statement=2000
        -c log_line_prefix='%t [%p] user=%u db=%d app=%a '
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      # Volumen central de backups (DB dumps). Misma ruta /backups en todos los contenedores.
      - ./backups:/backups
    shm_size: '2gb'
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # NGINX — Proxy inverso + SSL
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: odoo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    networks:
      - odoo_net
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "3" }

  # ---------------------------------------------------------------------------
  # CERTBOT — Renovación automática SSL cada 12h
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: odoo_certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

  # ---------------------------------------------------------------------------
  # Los servicios Odoo se insertan acá automáticamente por sync-projects.sh.
  # No hay ningún proyecto por defecto: agregá los tuyos en projects-registry.conf
  # y ejecutá ./scripts/sync-projects.sh --apply (o usá la PLANTILLA de abajo).
  # ---------------------------------------------------------------------------

  # __SYNC_SERVICES_INSERT__

  # PLANTILLA — Copiar para agregar un nuevo proyecto manualmente
  # Ver docs/02-agregar-proyecto-dominio.md o usar sync-projects.sh
  # ---------------------------------------------------------------------------
  # odoo{VERSION}_{PROYECTO}_{ENTORNO}:
  #   build:                                  # build obligatorio (ver build/Dockerfile)
  #     context: .
  #     dockerfile: build/Dockerfile
  #     args:
  #       ODOO_BASE_IMAGE: odoo:{VERSION}.0   # o imagen privada/digest (config/versions/{VERSION}.conf)
  #       ODOO_VERSION: "{VERSION}"
  #   image: extendrix/odoo:{VERSION}          # tag cacheable, 1 imagen por versión
  #   container_name: odoo{VERSION}_{PROYECTO}_{ENTORNO}
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     HOST: db
  #     PORT: 5432
  #     USER: ${POSTGRES_USER:-odoo}
  #     PASSWORD: ${POSTGRES_PASSWORD}
  #   # Entrypoint horneado en la imagen (build/Dockerfile): inyecta admin_passwd
  #   # e instala los requirements.txt de los módulos al arrancar.
  #   volumes:
  #     - odoo{VERSION}_{PROYECTO}_{ENTORNO}_data:/var/lib/odoo
  #     - ./projects/{PROYECTO}/odoo{VERSION}/{ENTORNO}/config/odoo.conf:/etc/odoo/odoo.conf:ro
  #     - ./projects/{PROYECTO}/odoo{VERSION}/{ENTORNO}/addons:/mnt/extra-addons
  #     - ./shared-addons/{VERSION}:/mnt/shared-addons:ro
  #     - ./enterprise/odoo{VERSION}:/mnt/enterprise:ro
  #     - ./backups:/backups
  #   ports:
  #     - "127.0.0.1:{PUERTO_HTTP}:8069"
  #     - "127.0.0.1:{PUERTO_LP}:8072"
  #   networks:
  #     - odoo_net
  #   command: ["odoo", "--config=/etc/odoo/odoo.conf"]
  #   mem_limit: 3g      # 2g para entornos dev
  #   cpus: 2.0          # 1.0 para entornos dev



# =============================================================================
# VOLÚMENES
# =============================================================================
volumes:
  postgres_data:
    name: odoo_postgres_data

  # __SYNC_VOLUMES_INSERT__

  # Agregar aquí el volumen de cada nuevo proyecto:
  # odoo{VERSION}_{PROYECTO}_{ENTORNO}_data:
  #   name: odoo{VERSION}_{PROYECTO}_{ENTORNO}_data

# =============================================================================
# RED INTERNA
# =============================================================================
networks:
  odoo_net:
    driver: bridge
    name: odoo_internal_net
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/24}
