# =============================================================================
# OLANOIT — VHosts por proyecto
# Los vhosts se agregan automáticamente via sync-projects.sh
# =============================================================================

# =============================================================================
# ODOO 19 | FARMANIACOS | STA
# Subdominio: farmaniacos-sta.OLANOIT.work
# =============================================================================
server {
    listen 80;
    server_name farmaniacos-sta.OLANOIT.work;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl; http2 on;
    server_name farmaniacos-sta.OLANOIT.work;

    ssl_certificate     /etc/letsencrypt/live/farmaniacos-sta.OLANOIT.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/farmaniacos-sta.OLANOIT.work/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/farmaniacos-sta.OLANOIT.work/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_farmaniacos_sta:10m;
    ssl_session_timeout 1d; ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000" always;
    # ssl_stapling deshabilitado: Let's Encrypt ya no embebe OCSP responder URL.
    resolver 8.8.8.8 valid=300s; resolver_timeout 5s;
    client_max_body_size 200m;

    location ~* /web/login {
        limit_req zone=odoo_login burst=3 nodelay;
        proxy_pass http://up_farmaniacos_sta_http;
        include /etc/nginx/conf.d/odoo-proxy-params.conf;
    }
    location /websocket {
        proxy_pass http://up_farmaniacos_sta_lp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 28800s; proxy_send_timeout 28800s;
    }
    location /longpolling {
        proxy_pass http://up_farmaniacos_sta_lp;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_redirect off;
        proxy_next_upstream off;
        proxy_read_timeout 28800s;
        proxy_send_timeout 28800s;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://up_farmaniacos_sta_http;
        include /etc/nginx/conf.d/odoo-proxy-params.conf;
        expires 30d; add_header Cache-Control "public, immutable"; access_log off;
    }
    location /web/database {
        return 404;
    }
    # Bloquear POST a raíz del dominio (notifications de ML mal configuradas u otros bots)
    location = / {
        if ($request_method !~ ^(GET|HEAD)$) { return 444; }
        proxy_pass http://up_farmaniacos_sta_http;
        include /etc/nginx/conf.d/odoo-proxy-params.conf;
    }
    location / {
        proxy_pass http://up_farmaniacos_sta_http;
        include /etc/nginx/conf.d/odoo-proxy-params.conf;
    }
}

