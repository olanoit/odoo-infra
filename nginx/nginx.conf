user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;

    # Gestión del upgrade WebSocket — debe estar dentro del bloque http
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    client_max_body_size  200m;

    gzip on; gzip_vary on; gzip_comp_level 4; gzip_min_length 256;
    gzip_types text/plain text/css text/scss text/xml application/xml application/json application/javascript image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;

    # Rate limiting: login y API
    limit_req_zone $binary_remote_addr zone=odoo_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=odoo_api:10m   rate=60r/s;

    include /etc/nginx/conf.d/*.conf;
}
