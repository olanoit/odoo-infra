# =============================================================================
# EXTENDRIX — Perfil de versión: Odoo 14
# Lo lee scripts/lib/version-profile.sh (sourceable, solo KEY=VALUE).
# Sin este archivo, el resolver deriva estos valores del número de versión.
# =============================================================================

# Imagen base del build (FROM). Oficial, privada o digest.
ODOO_BASE_IMAGE=odoo:14.0
# Dockerfile usado para construir la imagen de esta versión.
DOCKERFILE=build/Dockerfile

# Tiempo real: Odoo ≤15 usa longpolling y no expone websockets.
PORT_STYLE=longpolling
HAS_WEBSOCKETS=false

# Quirks de Odoo 14 (reemplazan los chequeos "es 14" del entrypoint).
SUPPORTS_ADMIN_PASSWD_CLI=false   # 14 no acepta --admin-passwd por CLI → se inyecta admin_passwd
NEEDS_ADDONS_SANITIZE=true        # 14 rechaza addons-path con directorios vacíos

# PostgreSQL recomendado (informativo; el servicio db es compartido).
PG_RECOMMENDED=13
