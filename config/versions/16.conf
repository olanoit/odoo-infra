# =============================================================================
# EXTENDRIX — Perfil de versión: Odoo 16
# Lo lee scripts/lib/version-profile.sh (sourceable, solo KEY=VALUE).
# Sin este archivo, el resolver deriva estos valores del número de versión.
# =============================================================================

ODOO_BASE_IMAGE=odoo:16.0
DOCKERFILE=build/Dockerfile

# Tiempo real: Odoo 16+ usa gevent_port y expone websockets.
PORT_STYLE=gevent
HAS_WEBSOCKETS=true

SUPPORTS_ADMIN_PASSWD_CLI=true
NEEDS_ADDONS_SANITIZE=false

PG_RECOMMENDED=15
