# =============================================================================
# EXTENDRIX — config/infra.conf
# Configuración GLOBAL (no-secreta) que consumen los SCRIPTS.
#
# Sourceable en bash (solo KEY=VALUE). Lo lee scripts/lib/version-profile.sh
# para computar el tag de las imágenes Odoo buildeadas.
#
# IMPORTANTE — separación de responsabilidades:
#   • Lo que consume docker-compose.yml (imagen y tuning de Postgres, subnet de
#     la red) va en .env, porque Compose solo interpola desde .env / el entorno
#     y NO lee este archivo. Ver .env.example.
#   • Aquí van solo los knobs que usan los scripts al GENERAR los servicios.
#   • Los SECRETOS (passwords, emails) siempre en .env.
# =============================================================================

# -----------------------------------------------------------------------------
# Imágenes Odoo buildeadas (build/Dockerfile)
# Toda instancia Odoo se construye desde build/Dockerfile (build obligatorio).
# La imagen base (FROM) de cada versión se define en config/versions/<V>.conf.
#
#   IMAGE_REGISTRY   vacío = imagen solo local; o "miregistry.com" para push/pull.
#   IMAGE_TAG_PREFIX prefijo del tag de las imágenes buildeadas.
# Tag resultante: {IMAGE_TAG_PREFIX}/odoo:{V}  (o {REGISTRY}/{PREFIX}-odoo:{V}).
# -----------------------------------------------------------------------------
IMAGE_REGISTRY=
IMAGE_TAG_PREFIX=extendrix
