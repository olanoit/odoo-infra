# =============================================================================
# EXTENDRIX — Registro de Proyectos
#
# Para agregar un nuevo proyecto:
#   1. Añade una línea con el formato: PROYECTO:VERSION:ENTORNO:DOMINIO:PUERTO_HTTP
#   2. Ejecuta: ./scripts/sync-projects.sh          (dry-run, ver qué haría)
#   3. Ejecuta: ./scripts/sync-projects.sh --apply  (aplicar cambios)
#
# Reglas de puertos:
#   - Puerto HTTP del host: único por instancia (ver tabla abajo)
#   - Puerto longpolling : puerto_http + 1 (ej: 19010 → 19011)
#   - Incremento por proyecto: +10 (ej: 19010, 19020, 19030...)
#
# Rango reservado (Odoo 14): 14010–14099  (longpolling = puerto_http + 1)
#   Otras versiones compatibles siguen la convención {ver}010–{ver}099.
#
# IMPORTANTE: No eliminar líneas de proyectos activos.
# =============================================================================

# Formato: PROYECTO:VERSION:ENTORNO:DOMINIO:PUERTO_HTTP
#
# Ejemplo (descomentar y adaptar, o agregar tus propias líneas):
